<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Portal</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { --g: #00FF41; --b: #0D0208; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--b); font-family: 'Courier New', monospace; overflow: hidden; color: var(--g); }
        
        /* THE BACKGROUND IMAGE - Lowered opacity so the green text pop */
        #bg-image {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.3; /* Adjust this to make your image brighter or darker */
            z-index: 1;
        }

        #matrix-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; opacity: 0.5; }

        #lock-screen { display: flex; justify-content: center; align-items: center; height: 100vh; position: relative; z-index: 10; }
        .box { border: 2px solid var(--g); padding: 30px; background: rgba(0,0,0,0.85); text-align: center; width: 280px; box-shadow: 0 0 20px var(--g); border-radius: 15px; }
        input { width: 85%; padding: 12px; margin: 20px 0; background: black; border: 1px solid var(--g); color: var(--g); font-size: 24px; text-align: center; outline: none; border-radius: 8px; }

        #matrix-loader { display: none; height: 100vh; width: 100vw; flex-direction: column; justify-content: center; align-items: center; position: absolute; top: 0; z-index: 10; background: rgba(0,0,0,0.6); }
        #log { font-size: 14px; width: 80%; max-width: 400px; text-shadow: 0 0 5px var(--g); text-align: left; }
    </style>
</head>
<body>

    <img id="bg-image" src="your-image-here.jpg" alt="Background">

    <canvas id="matrix-canvas"></canvas>

    <div id="lock-screen">
        <div class="box">
            <h2 style="letter-spacing: 2px;">SECURE_UPLINK</h2>
            <input type="password" id="pin" placeholder="PIN" inputmode="numeric" maxlength="4">
        </div>
    </div>

    <div id="matrix-loader">
        <div id="log"></div>
        <h3 style="margin-top:20px;">BYPASSING FIREWALL: <span id="timer">60</span>s</h3>
    </div>

    <script>
        const pin = document.getElementById('pin');
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "日Hｱﾐﾂﾃﾆﾊﾐﾋｰｳｼﾅﾓﾆｻﾜﾂｵﾘｱﾎﾃﾏｹﾒｴｶｷﾑﾕﾗﾙﾚﾛｦﾝ0123456789";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00FF41";
            ctx.font = fontSize + "px arial";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }

        // Run the matrix rain immediately on the lock screen
        const rainInterval = setInterval(drawMatrix, 35);

        pin.addEventListener('input', () => {
            if (pin.value === "1234") {
                pin.blur();
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('matrix-loader').style.display = 'flex';
                startHackerSequence();
            }
        });

        function startHackerSequence() {
            let timeLeft = 60; 
            const logLines = [
                "> Accessing Parkville Local Node...",
                "> BMS Credentials Accepted.",
                "> Handshaking with Snapchat Auth...",
                "> Bypassing 2FA requirement...",
                "> Connection Stable."
            ];
            
            let lineIdx = 0;
            const textInterval = setInterval(() => {
                if (lineIdx < logLines.length) {
                    document.getElementById('log').innerHTML += logLines[lineIdx] + "<br>";
                    lineIdx++;
                }
            }, 2500);

            const timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    window.location.replace("https://web.snapchat.com");
                }
            }, 1000);
        }
    </script>
</body>
</html>
