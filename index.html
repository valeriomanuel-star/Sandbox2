    <meta charset="UTF-8">

```
<!-- Prevent buggy iPhone app mode -->
<meta name="apple-mobile-web-app-capable" content="no">

<!-- Manifest -->
<link rel="manifest" href="manifest.json">

<!-- JS -->
<script defer src="app.js"></script>

<style>
    body {
        font-family: -apple-system, system-ui, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #f8f9fa;
    }

    #lock-screen, #app-content {
        text-align: center;
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        width: 85%;
        max-width: 350px;
    }

    #app-content { display: none; }

    input[type="password"] {
        width: 100%;
        padding: 15px;
        margin: 15px 0;
        border: 1px solid #ddd;
        border-radius: 12px;
        font-size: 18px;
        text-align: center;
    }

    button {
        background-color: #007AFF;
        color: white;
        border: none;
        padding: 15px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        width: 100%;
        cursor: pointer;
    }

    .snap-btn {
        background-color: #FFFC00;
        color: black;
        margin-top: 20px;
    }

    #error {
        color: #FF3B30;
        font-size: 14px;
        display: none;
    }
</style>
```

</head>
<body>

```
<div id="lock-screen">
    <h2>Enter Access Code</h2>
    <input type="password" id="passcode" placeholder="••••" inputmode="numeric">
    <button id="unlockBtn">Unlock</button>
    <p id="error">Incorrect Code</p>
</div>

<div id="app-content">
    <h2>Welcome Back</h2>

    <!-- Opens in Safari -->
    <a href="https://accounts.snapchat.com/v2/login" target="_blank">
        <button class="snap-btn">Open Snapchat</button>
    </a>

    <!-- Opens app -->
    <a href="snapchat://">
        <button style="margin-top:10px;">Open Snapchat App</button>
    </a>
</div>
```

</body>
</html>
