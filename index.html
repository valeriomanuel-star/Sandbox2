<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Portal</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
        }
        #lock-screen, #app-content {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 85%;
            max-width: 350px;
        }
        #app-content { display: none; }
        input[type="password"] {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 18px;
            text-align: center;
            outline: none;
            box-sizing: border-box;
        }
        button {
            background-color: #007AFF;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
        }
        .snap-btn {
            background-color: #FFFC00;
            color: black;
            margin-top: 20px;
            display: block;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
        }
        #error {
            color: #FF3B30;
            font-size: 14px;
            display: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h2>Enter Access Code</h2>
        <input type="password" id="passcode" placeholder="••••" inputmode="numeric">
        <button id="unlockBtn">Unlock</button>
        <p id="error">Incorrect Code</p>
    </div>

    <div id="app-content">
        <h2>Welcome Back</h2>
        <a href="[https://accounts.snapchat.com/v2/login](https://accounts.snapchat.com/v2/login)" target="_blank" class="snap-btn">Open Snapchat Web</a>
        <a href="snapchat://" style="display:block; margin-top:10px; color:#666; text-decoration:none; font-size:14px;">Open Snapchat App</a>
    </div>

    <script>
        const secret = "1234";

        function checkAccess() {
            const code = document.getElementById('passcode').value;
            if (code === secret) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
            } else {
                document.getElementById('error').style.display = 'block';
                document.getElementById('passcode').value = '';
            }
        }

        document.getElementById('unlockBtn').addEventListener('click', checkAccess);
        document.getElementById('passcode').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAccess();
        });
    </script>
</body>
</html>
