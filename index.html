<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Uplink</title>

<link rel="manifest" href="manifest.json">

<style>
:root { --g:#00FF41; }

body {
    margin:0;
    background:black;
    color:var(--g);
    font-family:monospace;
    overflow:hidden;
}

/* Screens */
.screen {
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.active { display:flex; }

/* Box */
.box {
    border:2px solid var(--g);
    padding:30px;
    background:rgba(0,0,0,0.9);
    box-shadow:0 0 20px var(--g);
    border-radius:10px;
    text-align:center;
}

/* Input */
input {
    font-size:24px;
    padding:10px;
    margin-top:15px;
    width:140px;
    text-align:center;
    background:black;
    border:1px solid var(--g);
    color:var(--g);
}

/* Button */
button {
    margin-top:15px;
    padding:10px 20px;
    background:black;
    border:1px solid var(--g);
    color:var(--g);
    cursor:pointer;
}

/* Face ID */
#face {
    width:120px;
    height:120px;
    border:3px solid var(--g);
    border-radius:50%;
    animation:pulse 1.5s infinite;
}

@keyframes pulse {
    0% { box-shadow:0 0 5px var(--g); }
    50% { box-shadow:0 0 25px var(--g); }
    100% { box-shadow:0 0 5px var(--g); }
}

/* Hack log */
#log {
    width:80%;
    max-width:400px;
    text-align:left;
    font-size:14px;
    margin-bottom:20px;
}
</style>
</head>

<body>

<!-- LOCK SCREEN -->
<div id="lock" class="screen active">
    <div class="box">
        <h2>SECURE_UPLINK</h2>
        <input id="pin" maxlength="4" placeholder="PIN">
        <button id="unlockBtn">Unlock</button>
        <p id="error"></p>
    </div>
</div>

<!-- HACK SEQUENCE -->
<div id="hack" class="screen">
    <div id="log"></div>
    <h3>BYPASSING FIREWALL: <span id="timer">60</span>s</h3>
</div>

<!-- FACE ID -->
<div id="faceScreen" class="screen">
    <div id="face"></div>
    <p>Scanning Face...</p>
</div>

<!-- PROFILE SETUP -->
<div id="profileSetup" class="screen">
    <div class="box">
        <h2>CREATE PROFILE</h2>
        <input id="username" placeholder="Username">
        <button onclick="saveProfile()">ENTER</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="screen">
    <h2>SECURE SYSTEM</h2>
    <p id="welcome"></p>
    <button onclick="launchSnap()">Open Snapchat</button>
    <button onclick="logout()">Logout</button>
</div>

<!-- ====== JS EMBEDDED ====== -->
<script>
document.addEventListener("DOMContentLoaded", () => {

    const secret = "1234";

    // Screens
    const screens = {
        lock: document.getElementById("lock"),
        hack: document.getElementById("hack"),
        face: document.getElementById("faceScreen"),
        profile: document.getElementById("profileSetup"),
        dashboard: document.getElementById("dashboard")
    };

    // Elements
    const pin = document.getElementById("pin");
    const unlockBtn = document.getElementById("unlockBtn");
    const error = document.getElementById("error");

    // ========================
    // PIN CHECK
    // ========================
    function checkPin() {
        if (pin.value === secret) {
            startSystem();
        } else {
            error.innerText = "ACCESS DENIED";
            pin.value = "";
        }
    }

    unlockBtn.addEventListener("click", checkPin);
    pin.addEventListener("keydown", (e) => {
        if (e.key === "Enter") checkPin();
    });

    // ========================
    // SCREEN SWITCH FUNCTION
    // ========================
    function show(screen) {
        Object.values(screens).forEach(s => s.classList.remove("active"));
        screen.classList.add("active");
    }

    // ========================
    // START SYSTEM (HACK SEQUENCE)
    // ========================
    function startSystem() {
        show(screens.hack);
        startHack();
    }

    function startHack() {
        let time = 60;
        const log = document.getElementById("log");
        log.innerHTML = "";
        const lines = [
            "> Establishing secure tunnel...",
            "> Injecting exploit...",
            "> Bypassing authentication...",
            "> Masking identity...",
            "> Access granted..."
        ];

        let i = 0;
        const logInterval = setInterval(() => {
            if (i < lines.length) {
                log.innerHTML += lines[i] + "<br>";
                i++;
            } else clearInterval(logInterval);
        }, 2000);

        const timerInterval = setInterval(() => {
            time--;
            document.getElementById("timer").innerText = time;
            if (time <= 0) {
                clearInterval(timerInterval);
                showFace();
            }
        }, 1000);
    }

    // ========================
    // FACE ID
    // ========================
    function showFace() {
        show(screens.face);
        setTimeout(() => {
            const user = localStorage.getItem("profileName");
            if (user) loadDashboard();
            else show(screens.profile);
        }, 3000);
    }

    // ========================
    // PROFILE SETUP
    // ========================
    window.saveProfile = function() {
        const name = document.getElementById("username").value;
        if (!name) return;
        localStorage.setItem("profileName", name);
        loadDashboard();
    };

    // ========================
    // DASHBOARD
    // ========================
    function loadDashboard() {
        show(screens.dashboard);
        const name = localStorage.getItem("profileName");
        document.getElementById("welcome").innerText = "Welcome, " + name;
    }

    window.logout = function() {
        localStorage.removeItem("profileName");
        location.reload();
    };

    window.launchSnap = function() {
        window.location.href = "https://web.snapchat.com";
    };

});
</script>

</body>
</html>
