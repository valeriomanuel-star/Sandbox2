<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Sandbox</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; }
        h1 { color: #007bff; }
        #image-container { 
            margin: 20px auto; 
            padding: 15px; 
            background: white; 
            border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            max-width: 500px;
        }
        #shared-img { width: 100%; border-radius: 10px; display: none; margin-top: 10px; }
        iframe { width: 100%; height: 60vh; border: none; border-radius: 15px; margin-top: 20px; }
        .status-text { color: #666; font-style: italic; }
    </style>
</head>
<body>

    <h1>My App Sandbox</h1>

    <div id="image-container">
        <p id="status" class="status-text">No snapshot shared yet.</p>
        <img id="shared-img" alt="Shared Snapshot" />
    </div>

   <iframe src="https://web.snapchat.com"></iframe>

    <script>
        // Handle incoming Shared Files
        window.addEventListener('DOMContentLoaded', () => {
            const parsedUrl = new URL(window.location);
            
            // Logic to catch shared text/URLs (which is how images often arrive on static hosts)
            const sharedUrl = parsedUrl.searchParams.get('url') || parsedUrl.searchParams.get('text');

            if (sharedUrl) {
                const img = document.getElementById('shared-img');
                const status = document.getElementById('status');
                
                img.src = sharedUrl;
                img.style.display = 'block';
                status.innerText = "Received Snapshot:";
            }
        });

        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker Registered!'))
                    .catch(err => console.log('Registration Failed', err));
            });
        }
    </script>

</body>
</html>
