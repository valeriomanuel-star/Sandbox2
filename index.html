<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Secure Uplink</title>

<style>
:root { --g:#00FF41; --b:#000; }

body {
    margin:0;
    background:black;
    color:var(--g);
    font-family:monospace;
    overflow:hidden;
    /* Prevents accidental text selection while "hacking" */
    -webkit-user-select: none;
    user-select: none;
}

#matrix-canvas {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    z-index:0;
    opacity:0.4;
}

.screen {
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    position:relative;
    z-index:1;
}

.active { display:flex; }

.box {
    border:2px solid var(--g);
    padding:30px;
    background:rgba(0,0,0,0.9);
    box-shadow:0 0 20px var(--g);
    border-radius:10px;
    text-align:center;
    width: 80%;
    max-width: 300px;
}

input {
    font-size:24px;
    padding:10px;
    margin-top:15px;
    width:90%;
    text-align:center;
    background:black;
    border:1px solid var(--g);
    color:var(--g);
    outline: none;
}

button {
    margin-top:20px;
    padding:12px 30px;
    background:black;
    border:1px solid var(--g);
    color:var(--g);
    cursor:pointer;
    width: 100%;
    font-weight: bold;
}

#face {
    width:120px;
    height:120px;
    border:3px solid var(--g);
    border-radius:50%;
    animation:pulse 1.5s infinite;
    position: relative;
}

/* Added a scanning line to the Face ID */
#face::after {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 2px;
    background: var(--g);
    animation: faceScan 2s infinite linear;
}

@keyframes faceScan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

@keyframes pulse {
    0% { box-shadow:0 0 5px var(--g); }
    50% { box-shadow:0 0 25px var(--g); }
    100% { box-shadow:0 0 5px var(--g); }
}

#log {
    width:80%;
    max-width:400px;
    text-align:left;
    font-size:14px;
    margin-bottom:20px;
}

.dashboard-btn {
    margin:10px 0;
    padding:12px 20px;
    background:#FFFC00;
    border:none;
    border-radius:12px;
    font-weight:bold;
    color:black;
    cursor:pointer;
    width:100%;
}
</style>
</head>

<body>

<canvas id="matrix-canvas"></canvas>

<div id="lock" class="screen active">
    <div class="box">
        <h2>SECURE_UPLINK</h2>
        <input id="pin" maxlength="4" placeholder="PIN" inputmode="numeric" type="password">
        <button id="unlockBtn">Unlock</button>
        <p id="error" style="color: red; font-size: 12px; margin-top: 10px;"></p>
    </div>
</div>

<div id="hack" class="screen">
    <div id="log"></div>
    <h3>BYPASSING FIREWALL: <span id="timer">60</span>s</h3>
</div>

<div id="faceScreen" class="screen">
    <div id="face"></div>
    <p style="margin-top: 20px;">Scanning Biometrics...</p>
</div>

<div id="profileSetup" class="screen">
    <div class="box">
        <h2>NEW OPERATOR</h2>
        <input id="username" placeholder="Username" spellcheck="false">
        <button onclick="saveProfile()">INITIALIZE</button>
    </div>
</div>

<div id="dashboard" class="screen">
    <div class="box">
        <h2 id="welcome">Welcome</h2>
        <button class="dashboard-btn" onclick="window.location.href='https://web.snapchat.com'">Open Snapchat Web</button>
        <button class="dashboard-btn" style="background:transparent; color:var(--g); border: 1px solid var(--g);" onclick="logout()">Logout</button>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const secret = "1234";

    const screens = {
        lock: document.getElementById("lock"),
        hack: document.getElementById("hack"),
        face: document.getElementById("faceScreen"),
        profile: document.getElementById("profileSetup"),
        dashboard: document.getElementById("dashboard")
    };

    const pin = document.getElementById("pin");
    const unlockBtn = document.getElementById("unlockBtn");
    const error = document.getElementById("error");

    function checkPin() {
        if (pin.value === secret) {
            startSystem();
        } else {
            error.innerText = "ACCESS_DENIED";
            pin.value = "";
        }
    }

    unlockBtn.addEventListener("click", checkPin);
    pin.addEventListener("keydown", (e) => { if(e.key==="Enter") checkPin(); });

    function show(screen) {
        Object.values(screens).forEach(s => s.classList.remove("active"));
        screen.classList.add("active");
    }

    function startSystem() {
        show(screens.hack);
        startHack();
    }

    function startHack() {
        let time = 60;
        const log = document.getElementById("log");
        log.innerHTML="";
        const lines = [
            "> Establishing secure tunnel...",
            "> Overriding Parkville Node...",
            "> Bypassing BMS Firewall...",
            "> Masking digital signature...",
            "> Access granted."
        ];
        let i=0;
        const logInterval = setInterval(()=>{
            if(i<lines.length){ log.innerHTML+=lines[i]+"<br>"; i++; } else clearInterval(logInterval);
        },2000);

        const timerInterval = setInterval(()=>{
            time--;
            document.getElementById("timer").innerText=time;
            if(time<=0){ clearInterval(timerInterval); showFace(); }
        },1000);
    }

    function showFace(){
        show(screens.face);
        setTimeout(()=>{
            const user = localStorage.getItem("profileName");
            if(user) loadDashboard();
            else show(screens.profile);
        },3000);
    }

    window.saveProfile = function(){
        const name = document.getElementById("username").value;
        if(!name) return;
        localStorage.setItem("profileName", name);
        loadDashboard();
    };

    function loadDashboard(){
        show(screens.dashboard);
        const name = localStorage.getItem("profileName");
        document.getElementById("welcome").innerText="Welcome, "+ name.toUpperCase();
    }

    window.logout=function(){
        localStorage.removeItem("profileName");
        location.reload();
    };

    // ===== MATRIX EFFECT =====
    const canvas=document.getElementById("matrix-canvas");
    const ctx=canvas.getContext("2d");
    
    function resizeCanvas() {
        canvas.width=window.innerWidth;
        canvas.height=window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const letters="日Hｱﾐﾂﾃﾆﾊﾐﾋｰｳｼﾅﾓﾆｻﾜﾂｵﾘｱﾎﾃﾏｹﾒｴｶｷﾑﾕﾗﾙﾚﾛｦﾝ0123456789";
    const fontSize=16;
    let columns=Math.floor(canvas.width/fontSize);
    let drops=Array(columns).fill(1);

    function drawMatrix(){
        ctx.fillStyle="rgba(0,0,0,0.05)";
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle="#00FF41";
        ctx.font=fontSize+"px monospace";
        for(let i=0;i<drops.length;i++){
            const text=letters.charAt(Math.floor(Math.random()*letters.length));
            ctx.fillText(text,i*fontSize,drops[i]*fontSize);
            if(drops[i]*fontSize>canvas.height && Math.random()>0.975) drops[i]=0;
            drops[i]++;
        }
    }

    setInterval(drawMatrix,35);
});
</script>

</body>
</html>
