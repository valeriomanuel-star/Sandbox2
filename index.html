<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure System</title>

<style>
:root { --g:#00FF41; --b:#0D0208; }
body {
    margin:0;
    background:black;
    color:var(--g);
    font-family:monospace;
    overflow:hidden;
}

/* Center screen */
.center {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
}

/* Box */
.box {
    border:2px solid var(--g);
    padding:30px;
    background:rgba(0,0,0,0.9);
    box-shadow:0 0 20px var(--g);
    border-radius:10px;
    text-align:center;
}

/* Input */
input {
    font-size:24px;
    padding:10px;
    margin-top:15px;
    width:120px;
    text-align:center;
    background:black;
    border:1px solid var(--g);
    color:var(--g);
}

/* Hidden screens */
.hidden { display:none; }

/* Face ID circle */
#face {
    width:120px;
    height:120px;
    border:3px solid var(--g);
    border-radius:50%;
    animation:pulse 1.5s infinite;
}

@keyframes pulse {
    0% { box-shadow:0 0 5px var(--g); }
    50% { box-shadow:0 0 25px var(--g); }
    100% { box-shadow:0 0 5px var(--g); }
}
</style>
</head>

<body>

<!-- LOCK SCREEN -->
<div id="lock" class="center">
    <div class="box">
        <h2>SECURE_UPLINK</h2>
        <input id="pin" maxlength="4" placeholder="PIN">
        <p id="error"></p>
    </div>
</div>

<!-- HACK SCREEN -->
<div id="hack" class="center hidden">
    <div id="log"></div>
    <h3>BYPASSING FIREWALL: <span id="timer">60</span>s</h3>
</div>

<!-- FACE ID -->
<div id="faceScreen" class="center hidden">
    <div id="face"></div>
    <p>Scanning Face...</p>
</div>

<script>
const pin = document.getElementById("pin");
const error = document.getElementById("error");

/* PIN LOGIC */
pin.addEventListener("input", () => {
    if (pin.value.length === 4) {
        if (pin.value === "1234") {
            startSystem();
        } else {
            error.innerText = "ACCESS DENIED";
            pin.value = "";
        }
    }
});

/* START SYSTEM */
function startSystem() {
    document.documentElement.requestFullscreen().catch(()=>{});
    document.getElementById("lock").classList.add("hidden");
    document.getElementById("hack").classList.remove("hidden");
    startHack();
}

/* HACK SEQUENCE */
function startHack() {
    let time = 60;
    const log = document.getElementById("log");

    const lines = [
        "> Establishing secure tunnel...",
        "> Injecting exploit...",
        "> Bypassing authentication...",
        "> Masking identity...",
        "> Access granted..."
    ];

    let i = 0;

    const logInterval = setInterval(() => {
        if (i < lines.length) {
            log.innerHTML += lines[i] + "<br>";
            i++;
        } else {
            clearInterval(logInterval);
        }
    }, 2000);

    const timer = setInterval(() => {
        time--;
        document.getElementById("timer").innerText = time;

        if (time <= 0) {
            clearInterval(timer);
            showFaceID();
        }
    }, 1000);
}

/* FACE ID */
function showFaceID() {
    document.getElementById("hack").classList.add("hidden");
    document.getElementById("faceScreen").classList.remove("hidden");

    setTimeout(() => {
        document.body.innerHTML = "<h1 style='text-align:center;margin-top:40vh;'>ACCESS GRANTED</h1>";
        
        setTimeout(() => {
            window.location.href = "https://web.snapchat.com";
        }, 2000);

    }, 3000);
}
</script>

</body>
</html>
