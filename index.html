<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Uplink</title>

<style>
:root { --g:#00FF41; --b:#000; }

body {
    margin:0;
    background:black;
    color:var(--g);
    font-family:monospace;
    overflow:hidden;
}

/* Canvas for Matrix */
#matrix-canvas {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    z-index:0;
    opacity:0.5;
}

/* Screens */
.screen {
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    position:relative;
    z-index:1;
}

.active { display:flex; }

/* Box */
.box {
    border:2px solid var(--g);
    padding:30px;
    background:rgba(0,0,0,0.85);
    box-shadow:0 0 20px var(--g);
    border-radius:10px;
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* Input */
input {
    font-size:24px;
    padding:10px;
    margin-top:15px;
    width:140px;
    text-align:center;
    background:black;
    border:1px solid var(--g);
    color:var(--g);
}

/* Button */
button {
    margin-top:10px;
    padding:10px 30px;
    background:black;
    border:1px solid var(--g);
    color:var(--g);
    cursor:pointer;
    align-self:center;
}

/* Face ID */
#face {
    width:120px;
    height:120px;
    border:3px solid var(--g);
    border-radius:50%;
    animation:pulse 1.5s infinite;
}

@keyframes pulse {
    0% { box-shadow:0 0 5px var(--g); }
    50% { box-shadow:0 0 25px var(--g); }
    100% { box-shadow:0 0 5px var(--g); }
}

/* Hack log */
#log {
    width:80%;
    max-width:400px;
    text-align:left;
    font-size:14px;
    margin-bottom:20px;
}

/* Dashboard buttons */
.dashboard-btn {
    margin:10px 0;
    padding:12px 20px;
    background:#FFFC00;
    border:none;
    border-radius:12px;
    font-weight:bold;
    color:black;
    cursor:pointer;
    width:200px;
}
</style>
</head>

<body>

<canvas id="matrix-canvas"></canvas>

<!-- LOCK SCREEN -->
<div id="lock" class="screen active">
    <div class="box">
        <h2>SECURE_UPLINK</h2>
        <input id="pin" maxlength="4" placeholder="PIN">
        <button id="unlockBtn">Unlock</button>
        <p id="error"></p>
    </div>
</div>

<!-- HACK SEQUENCE -->
<div id="hack" class="screen">
    <div id="log"></div>
    <h3>BYPASSING FIREWALL: <span id="timer">60</span>s</h3>
</div>

<!-- FACE ID -->
<div id="faceScreen" class="screen">
    <div id="face"></div>
    <p>Scanning Face...</p>
</div>

<!-- PROFILE SETUP -->
<div id="profileSetup" class="screen">
    <div class="box">
        <h2>CREATE PROFILE</h2>
        <input id="username" placeholder="Username">
        <button onclick="saveProfile()">ENTER</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="screen">
    <h2>SECURE SYSTEM</h2>
    <p id="welcome"></p>
    <button class="dashboard-btn" onclick="window.open('https://accounts.snapchat.com/v2/login', '_blank')">Open Snapchat Web</button>
    <a href="snapchat://" style="display:block; margin-top:10px; color:#666; text-decoration:none; font-size:14px;">Open Snapchat App</a>
    <button class="dashboard-btn" onclick="logout()">Logout</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const secret = "1234";

    const screens = {
        lock: document.getElementById("lock"),
        hack: document.getElementById("hack"),
        face: document.getElementById("faceScreen"),
        profile: document.getElementById("profileSetup"),
        dashboard: document.getElementById("dashboard")
    };

    const pin = document.getElementById("pin");
    const unlockBtn = document.getElementById("unlockBtn");
    const error = document.getElementById("error");

    function checkPin() {
        if (pin.value === secret) {
            startSystem();
        } else {
            error.innerText = "ACCESS DENIED";
            pin.value = "";
        }
    }

    unlockBtn.addEventListener("click", checkPin);
    pin.addEventListener("keydown", (e) => { if(e.key==="Enter") checkPin(); });

    function show(screen) {
        Object.values(screens).forEach(s => s.classList.remove("active"));
        screen.classList.add("active");
    }

    function startSystem() {
        show(screens.hack);
        startHack();
    }

    function startHack() {
        let time = 60;
        const log = document.getElementById("log");
        log.innerHTML="";
        const lines = [
            "> Establishing secure tunnel...",
            "> Injecting exploit...",
            "> Bypassing authentication...",
            "> Masking identity...",
            "> Access granted..."
        ];
        let i=0;
        const logInterval = setInterval(()=>{
            if(i<lines.length){ log.innerHTML+=lines[i]+"<br>"; i++; } else clearInterval(logInterval);
        },2000);

        const timerInterval = setInterval(()=>{
            time--;
            document.getElementById("timer").innerText=time;
            if(time<=0){ clearInterval(timerInterval); showFace(); }
        },1000);
    }

    function showFace(){
        show(screens.face);
        setTimeout(()=>{
            const user = localStorage.getItem("profileName");
            if(user) loadDashboard();
            else show(screens.profile);
        },3000);
    }

    window.saveProfile = function(){
        const name = document.getElementById("username").value;
        if(!name) return;
        localStorage.setItem("profileName", name);
        loadDashboard();
    };

    function loadDashboard(){
        show(screens.dashboard);
        const name = localStorage.getItem("profileName");
        document.getElementById("welcome").innerText="Welcome, "+name;
    }

    window.logout=function(){
        localStorage.removeItem("profileName");
        location.reload();
    };

    // ===== MATRIX EFFECT =====
    const canvas=document.getElementById("matrix-canvas");
    const ctx=canvas.getContext("2d");
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
    const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    const fontSize=16;
    const columns=Math.floor(canvas.width/fontSize);
    const drops=Array(columns).fill(1);

    function drawMatrix(){
        ctx.fillStyle="rgba(0,0,0,0.05)";
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle="#00FF41";
        ctx.font=fontSize+"px monospace";
        for(let i=0;i<drops.length;i++){
            const text=letters.charAt(Math.floor(Math.random()*letters.length));
            ctx.fillText(text,i*fontSize,drops[i]*fontSize);
            if(drops[i]*fontSize>canvas.height && Math.random()>0.975) drops[i]=0;
            drops[i]++;
        }
    }

    setInterval(drawMatrix,35);

});
</script>

</body>
</html>
