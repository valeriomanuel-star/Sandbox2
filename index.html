<div id="image-container" style="margin-top: 20px;">
    <p id="status">No image shared yet.</p>
    <img id="shared-img" style="max-width: 90%; border-radius: 10px; display: none;" />
</div>

<script>
  // This code runs as soon as the app opens
  window.addEventListener('DOMContentLoaded', () => {
    const parsedUrl = new URL(window.location);
    const sharedUrl = parsedUrl.searchParams.get('url') || parsedUrl.searchParams.get('text');

    if (sharedUrl) {
      const img = document.getElementById('shared-img');
      const status = document.getElementById('status');
      
      img.src = sharedUrl;
      img.style.display = 'block';
      status.innerText = "Shared Snapshot:";
    }
  });

  // Your existing Service Worker registration
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('App ready!'));
  }
</script>
