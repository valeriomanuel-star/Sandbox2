<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Portal</title>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, sans-serif;
            background-color: #f2f2f7;
            overflow: hidden; /* Prevents scrolling away from the lock screen */
        }

        /* Lock Screen Styles */
        #lock-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            transition: opacity 0.4s ease;
        }

        .box {
            background: white;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 85%;
            max-width: 350px;
        }

        input[type="password"] {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            border: 1px solid #d1d1d6;
            border-radius: 14px;
            font-size: 24px;
            text-align: center;
            outline: none;
            box-sizing: border-box;
        }

        /* App Content / The "Container" */
        #app-content {
            display: none;
            width: 100%;
            height: 100vh;
            background: white;
        }

        /* The Magic Part: Keeping them in the HTML */
        iframe {
            width: 100%;
            height: calc(100% - 60px); /* Leaves room for a 'Back' bar */
            border: none;
        }

        .top-bar {
            height: 60px;
            background: #FFFC00; /* Snapchat Yellow */
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-weight: bold;
            justify-content: space-between;
        }

        .exit-btn {
            background: black;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="box">
            <h2>Access Code</h2>
            <input type="password" id="passcode" placeholder="••••" inputmode="numeric" maxlength="4">
            <p id="error" style="color:red; display:none;">Try Again</p>
        </div>
    </div>

    <div id="app-content">
        <div class="top-bar">
            <span>Snapchat Web View</span>
            <button class="exit-btn" onclick="location.reload()">Lock Portal</button>
        </div>
        <iframe src="https://web.snapchat.com" allow="camera; microphone"></iframe>
    </div>

    <script>
        const secret = "1234";
        const passInput = document.getElementById('passcode');

        passInput.addEventListener('input', () => {
            if (passInput.value === secret) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
            } else if (passInput.value.length >= 4) {
                document.getElementById('error').style.display = 'block';
                passInput.value = '';
            }
        });
    </script>
</body>
</html>
