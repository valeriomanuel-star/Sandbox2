<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Uplink</title>

<link rel="manifest" href="manifest.json">

<style>
:root { --g:#00FF41; }

body {
    margin:0;
    background:black;
    color:var(--g);
    font-family:monospace;
    overflow:hidden;
}

/* Screens */
.screen {
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.active { display:flex; }

/* Box */
.box {
    border:2px solid var(--g);
    padding:30px;
    background:rgba(0,0,0,0.9);
    box-shadow:0 0 20px var(--g);
    border-radius:10px;
    text-align:center;
}

/* Input */
input {
    font-size:24px;
    padding:10px;
    margin-top:15px;
    width:140px;
    text-align:center;
    background:black;
    border:1px solid var(--g);
    color:var(--g);
}

/* Button */
button {
    margin-top:15px;
    padding:10px 20px;
    background:black;
    border:1px solid var(--g);
    color:var(--g);
}

/* Face ID */
#face {
    width:120px;
    height:120px;
    border:3px solid var(--g);
    border-radius:50%;
    animation:pulse 1.5s infinite;
}

@keyframes pulse {
    0% { box-shadow:0 0 5px var(--g); }
    50% { box-shadow:0 0 25px var(--g); }
    100% { box-shadow:0 0 5px var(--g); }
}
</style>
</head>

<body>

<!-- LOCK -->
<div id="lock" class="screen active">
    <div class="box">
        <h2>SECURE_UPLINK</h2>
        <input id="pin" maxlength="4" placeholder="PIN">
        <p id="error"></p>
    </div>
</div>

<!-- HACK -->
<div id="hack" class="screen">
    <div id="log"></div>
    <h3>BYPASSING FIREWALL: <span id="timer">60</span>s</h3>
</div>

<!-- FACE -->
<div id="faceScreen" class="screen">
    <div id="face"></div>
    <p>Scanning Face...</p>
</div>

<!-- PROFILE -->
<div id="profileSetup" class="screen">
    <div class="box">
        <h2>CREATE PROFILE</h2>
        <input id="username" placeholder="Username">
        <button onclick="saveProfile()">ENTER</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="screen">
    <h2>SECURE SYSTEM</h2>
    <p id="welcome"></p>

    <button onclick="launchSnap()">Open Snapchat</button>
    <button onclick="logout()">Logout</button>
</div>

<script src="app.js"></script>
</body>
</html>
