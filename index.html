<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Sandbox</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        iframe { width: 100%; height: 80vh; border: none; border-radius: 15px; }
    </style>
</head>
<body>
    <h1>My App Sandbox</h1>
    <iframe src="https://www.tiktok.com"></iframe>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('App ready!'))
        .catch(err => console.log('Setup failed', err));
    });
  }
</script>

</body>
</html>
